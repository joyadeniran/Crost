services:
  - type: web
    name: crost-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci --include=dev && rm -rf .next && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: LITELLM_BASE_URL
        sync: false
      - key: LITELLM_MASTER_KEY
        sync: false
      - key: CLOUD_MODEL
        value: groq/llama-3.3-70b-versatile
      - key: CLOUD_MODEL_WORKER
        value: groq/llama-3.3-70b-versatile
      - key: USER_API_ENCRYPTION_KEY
        sync: false
    healthCheckPath: /api/health

  - type: web
    name: crost-litellm
    runtime: docker
    rootDir: litellm
    healthCheckPath: /health/liveliness
    envVars:
      - key: LITELLM_MASTER_KEY
        sync: false
      - key: LITELLM_LOG
        value: DEBUG
      - key: LITELLM_PROXY_ADMIN_KEY
        sync: false
      - key: PORT
        value: 4000

  - type: worker
    name: crost-worker
    runtime: node
    rootDir: .
    buildCommand: npm ci && npm ci --prefix frontend
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: LITELLM_BASE_URL
        sync: false
      - key: LITELLM_MASTER_KEY
        sync: false
