services:
  - type: web
    name: crost-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: LITELLM_BASE_URL
        sync: false
      - key: LITELLM_MASTER_KEY
        sync: false
    healthCheckPath: /api/health

  - type: worker          # <--- FIXED: changed from 'background' to 'worker'
    name: crost-worker
    runtime: node
    rootDir: .            # <--- KEEP: forces execution from repo root
    buildCommand: npm ci && npm ci --prefix frontend
    startCommand: npx tsx scripts/worker.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: LITELLM_BASE_URL
        sync: false
      - key: LITELLM_MASTER_KEY
        sync: false
