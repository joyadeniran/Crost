steps:
  # Pull Firebase public config secrets for build-time baking into Next.js
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        echo "NEXT_PUBLIC_FIREBASE_API_KEY=$(gcloud secrets versions access latest --secret=NEXT_PUBLIC_FIREBASE_API_KEY --project=$PROJECT_ID)" >> /workspace/frontend/.env.production
        echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$(gcloud secrets versions access latest --secret=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN --project=$PROJECT_ID)" >> /workspace/frontend/.env.production
        echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=$(gcloud secrets versions access latest --secret=NEXT_PUBLIC_FIREBASE_PROJECT_ID --project=$PROJECT_ID)" >> /workspace/frontend/.env.production
        echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$(gcloud secrets versions access latest --secret=NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET --project=$PROJECT_ID)" >> /workspace/frontend/.env.production
        echo "NEXT_PUBLIC_FIREBASE_APP_ID=$(gcloud secrets versions access latest --secret=NEXT_PUBLIC_FIREBASE_APP_ID --project=$PROJECT_ID)" >> /workspace/frontend/.env.production
        svc_url=$$(gcloud run services describe crost-frontend --region=us-central1 --project=$PROJECT_ID --format='value(status.url)' 2>/dev/null || echo "https://crost-frontend-3ge3tx36sa-uc.a.run.app")
        echo "NEXT_PUBLIC_APP_URL=$$svc_url" >> /workspace/frontend/.env.production

  # Build frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/crost-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/crost-frontend:latest'
      - './frontend'

  # Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/crost-frontend:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/crost-frontend:latest']

  # Deploy to Cloud Run with runtime secrets
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - crost-frontend
      - '--image=gcr.io/$PROJECT_ID/crost-frontend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--add-cloudsql-instances=$PROJECT_ID:us-central1:crost-db'
      - '--set-env-vars=NODE_ENV=production,GCP_PROJECT_ID=$PROJECT_ID'
      - >-
        --set-secrets=DATABASE_URL=DATABASE_URL:latest,FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest,GOOGLE_AI_STUDIO_API_KEY=GOOGLE_AI_STUDIO_API_KEY:latest,GCS_BUCKET=GCS_BUCKET:latest,CRON_SECRET=CRON_SECRET:latest,WORKER_INTERNAL_SECRET=WORKER_INTERNAL_SECRET:latest,GOOGLE_OAUTH_CLIENT_ID=GOOGLE_OAUTH_CLIENT_ID:latest,GOOGLE_OAUTH_CLIENT_SECRET=GOOGLE_OAUTH_CLIENT_SECRET:latest

images:
  - 'gcr.io/$PROJECT_ID/crost-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/crost-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
